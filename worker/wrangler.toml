name = "bedtimetunes-audio"
main = "src/index.js"
compatibility_date = "2026-05-29"

[[d1_databases]]
binding = "DB"
database_name = "bedtimetunes"
database_id = "f3c824f9-88a9-401c-b148-281589c6cb65"   # <-- your real D1 id (keep what's already in YOUR repo)

# Cloudflare Email Service (public beta) — send new-song + broadcast emails
[[send_email]]
name = "EMAIL"

[vars]
ALLOWED_ORIGIN  = "https://bedtimetunes.com"
ALLOWED_REFERER = "bedtimetunes.com"
B2_ENDPOINT     = "https://s3.us-west-004.backblazeb2.com"
B2_BUCKET       = "bedtimetunes"
DEFAULT_UPLOADER = "2"
CONTRIBUTORS = "{\"lewi.hirvela@gmail.com\":2,\"antisubliminal@gmail.com\":4}"
MAIL_FROM    = "tunes@bedtimetunes.com"   # must be on your onboarded Email Sending domain
OWNER_EMAIL  = "lewi.hirvela@gmail.com"

# Secrets (not here): SYNC_TOKEN, B2_KEY_ID, B2_APP_KEY  (wrangler secret put …)
# Access protects: /add, /api/add, /admin, /new-user, /api/new-user, /users, /api/broadcast